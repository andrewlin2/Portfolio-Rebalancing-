name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check
        run: python -m compileall .

      - name: Run basic smoke test
        run: |
          python -c "import Rebalancer; print('Imported Rebalancer OK')"

  create-dmg:
    # run after the main build to produce a macOS DMG artifact
    needs: build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare DMG contents
        run: |
          mkdir -p dist/Portfolio-Rebalancing
          # copy project files - adjust as needed
          cp README.md dist/Portfolio-Rebalancing/ || true
          cp Rebalancer.py dist/Portfolio-Rebalancing/ || true
          cp gui.py dist/Portfolio-Rebalancing/ || true
          cp requirements.txt dist/Portfolio-Rebalancing/ || true
          if [ -f transactions.json ]; then cp transactions.json dist/Portfolio-Rebalancing/ || true; fi
          # make a small launcher script for convenience
          cat > dist/Portfolio-Rebalancing/run-rebalancer.sh <<'EOF'
          #!/bin/bash
          set -euo pipefail
          python Rebalancer.py
          EOF
          chmod +x dist/Portfolio-Rebalancing/run-rebalancer.sh

      - name: Create DMG
        run: |
          set -euxo pipefail
          PKG_NAME="Portfolio-Rebalancing"
          SRC_FOLDER="dist/Portfolio-Rebalancing"
          DMG_PATH="dist/${PKG_NAME}.dmg"
          # ensure folder exists and show diagnostics
          mkdir -p "$SRC_FOLDER"
          echo "Listing contents of dist before packaging:"
          ls -la dist || true
          # remove any previous artifact
          rm -f "$DMG_PATH"
          # create the DMG from the relative folder (checkout makes workspace root current dir)
          hdiutil create -volname "$PKG_NAME" -srcfolder "$SRC_FOLDER" -ov -format UDZO "$DMG_PATH"
          echo "DMG created at: $DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dmg
          path: dist/Portfolio-Rebalancing.dmg
