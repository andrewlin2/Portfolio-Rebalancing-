name: Python CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]    # ✅ quoted to prevent float parsing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check
        run: python -m compileall .

      - name: Run basic smoke test
        run: python -c "import Rebalancer; print('Imported Rebalancer OK')"

  create-dmg:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')   # ✅ only runs on version tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"              # ✅ quoted

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare macOS .app bundle
        run: |
          set -euxo pipefail
          APP_DIR="dist/Portfolio-Rebalancing.app/Contents/MacOS"
          mkdir -p "$APP_DIR"
          # create a small launcher executable that runs the python script
          cat > "$APP_DIR/Portfolio-Rebalancer" <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")/.." && pwd)"
          # run the bundled python file from Contents/Resources
          exec /usr/bin/env python "$DIR/Resources/Rebalancer.py" "$@"
          EOF
          chmod +x "$APP_DIR/Portfolio-Rebalancer"
          # put resources (only what the app needs) into Resources
          mkdir -p "dist/Portfolio-Rebalancing.app/Contents/Resources"
          cp gui.py "dist/Portfolio-Rebalancing.app/Contents/Resources/" || true
          # minimal Info.plist so Finder recognizes as app
          cat > dist/Portfolio-Rebalancing.app/Contents/Info.plist <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Portfolio-Rebalancing</string>
            <key>CFBundleExecutable</key>
            <string>Portfolio-Rebalancer</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.portfolio-rebalancing</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          XML

      - name: Create DMG
        run: |
          set -euxo pipefail
          PKG_NAME="Portfolio-Rebalancing"
          SRC_FOLDER="dist/Portfolio-Rebalancing.app"
          DMG_PATH="dist/${PKG_NAME}.dmg"
          mkdir -p "$SRC_FOLDER"
          echo "Listing contents of dist before packaging:"
          ls -la dist || true
          rm -f "$DMG_PATH"
          # create DMG that contains only the .app bundle
          hdiutil create -volname "$PKG_NAME" -srcfolder "$SRC_FOLDER" -ov -format UDZO "$DMG_PATH"
          echo "DMG created at: $DMG_PATH"

      - name: Run bundled app for diagnostics
        run: |
          set -euxo pipefail
          echo "Running the bundled app executable to capture runtime errors"
          ./dist/Portfolio-Rebalancing.app/Contents/MacOS/Portfolio-Rebalancer || true

      - name: Upload DMG to GitHub Release    # ✅ attaches to Release page
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Portfolio-Rebalancing.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-exe:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')   # ✅ only runs on version tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"              # ✅ quoted

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed Rebalancer.py

      - name: Upload EXE to GitHub Release    # ✅ attaches to Release page
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Rebalancer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}