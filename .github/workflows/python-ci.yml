name: Python CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]    # ✅ quoted to prevent float parsing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check
        run: python -m compileall .

      - name: Run basic smoke test
        run: python -c "import Rebalancer; print('Imported Rebalancer OK')"

  create-dmg:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')   # ✅ only runs on version tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"              # ✅ quoted

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare DMG contents
        run: |
          mkdir -p dist/Portfolio-Rebalancing
          cp README.md dist/Portfolio-Rebalancing/ || true
          cp Rebalancer.py dist/Portfolio-Rebalancing/ || true
          cp gui.py dist/Portfolio-Rebalancing/ || true
          cp requirements.txt dist/Portfolio-Rebalancing/ || true
          if [ -f transactions.json ]; then cp transactions.json dist/Portfolio-Rebalancing/ || true; fi
          cat > dist/Portfolio-Rebalancing/run-rebalancer.sh <<'EOF'
          #!/bin/bash
          set -euo pipefail
          python Rebalancer.py
          EOF
          chmod +x dist/Portfolio-Rebalancing/run-rebalancer.sh

      - name: Create DMG
        run: |
          set -euxo pipefail
          PKG_NAME="Portfolio-Rebalancing"
          SRC_FOLDER="dist/Portfolio-Rebalancing"
          DMG_PATH="dist/${PKG_NAME}.dmg"
          mkdir -p "$SRC_FOLDER"
          echo "Listing contents of dist before packaging:"
          ls -la dist || true
          rm -f "$DMG_PATH"
          hdiutil create -volname "$PKG_NAME" -srcfolder "$SRC_FOLDER" -ov -format UDZO "$DMG_PATH"
          echo "DMG created at: $DMG_PATH"

      - name: Upload DMG to GitHub Release    # ✅ attaches to Release page
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Portfolio-Rebalancing.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-exe:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')   # ✅ only runs on version tags
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"              # ✅ quoted

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed Rebalancer.py

      - name: Upload EXE to GitHub Release    # ✅ attaches to Release page
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Rebalancer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}