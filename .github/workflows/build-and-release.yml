name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller --onedir --windowed --name "Portfolio-Rebalancing" gui.py

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          if [ -d "dist/Portfolio-Rebalancing.app" ]; then
            cp -r dist/Portfolio-Rebalancing.app dist/dmg/
          else
            echo "Warning: dist/Portfolio-Rebalancing.app not found. Listing dist:"
            ls -la dist || true
          fi
          hdiutil create -volname "Portfolio-Rebalancing" -srcfolder dist/dmg -ov -format UDZO dist/Portfolio-Rebalancing.dmg

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/Portfolio-Rebalancing.dmg
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows exe
        shell: bash
        run: |
          pyinstaller --noconfirm --onefile --windowed --name PortfolioRebalancer gui.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/PortfolioRebalancer.exe
          retention-days: 1

  create-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac DMG
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: ./artifacts/mac

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/mac/*.dmg
            ./artifacts/windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




